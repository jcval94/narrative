title: "Ahorro presentado vs ahorro capturable"
subtitle: "La estimación se reduce al usar la población que la campaña sí puede accionar."
note: "La evidencia enseña que el denominador correcto cambia el business case."
analytic_level: 0
primary_technique: "regla de 3 con población elegible"
minimum_sufficient_technique: "embudo aritmético de ahorro capturable"
dashboard_constraints:
  filters: false
  tabs: false
  kpi_cards: false
  self_service: false
  max_visualizations: 1
chart:
  type: bar
  data:
    labels: ["Presentado", "Solo elegibles", "Capturable"]
    datasets:
      - label: "Ahorro anual estimado"
        data: [18.0, 8.0, 3.1]
        backgroundColor: ["#a84f35", "#3568a8", "#2f7d55"]
  options:
    plugins:
      legend:
        display: false
    scales:
      y:
        title:
          display: true
          text: "Millones de pesos"

