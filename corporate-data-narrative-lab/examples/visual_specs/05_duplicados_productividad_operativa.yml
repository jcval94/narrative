title: "Tickets cerrados vs problemas únicos"
subtitle: "La integración aumenta filas cerradas, no resolución real en la misma proporción."
note: "La evidencia enseña que una fila puede no ser la unidad de negocio."
analytic_level: 6
primary_technique: "calidad de datos y deduplicación"
minimum_sufficient_technique: "comparación de conteo bruto contra conteo único"
dashboard_constraints:
  filters: false
  tabs: false
  kpi_cards: false
  self_service: false
  max_visualizations: 1
chart:
  type: bar
  data:
    labels: ["Antes", "Después"]
    datasets:
      - label: "Tickets cerrados"
        data: [1520, 2580]
        backgroundColor: "#3568a8"
      - label: "Problemas únicos"
        data: [1400, 1510]
        backgroundColor: "#2f7d55"
  options:
    plugins:
      legend:
        position: bottom
    scales:
      y:
        title:
          display: true
          text: "Casos cerrados"

