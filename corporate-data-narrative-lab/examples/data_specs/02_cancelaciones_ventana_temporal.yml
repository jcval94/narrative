    type: category
    values: ["Economía Personal", "Mala Venta", "Precio", "Cambio de Producto", "Servicio"]
  - name: visible_in_tool
    type: boolean
  - name: included_in_6m_cut
    type: boolean
pattern: "Economía Personal y Mala Venta tienen mayor concentración entre los meses 7 y 14."
edge_cases:
  - "Casos de mala venta confirmados después del mes 9."
  - "Motivos tempranos que sí caben en la herramienta y crean falsa tranquilidad."
