case_id: "08"
related_case: "examples/cases/08_piloto_que_gano_temporada_facil.md"
case_title: "El piloto que contrató a diciembre"
narrative_motif: "diciembre"
corporate_satire_practice: "El calendario de aprobación elige la comparación y luego finge neutralidad."
exercises:
  - id: "08_obs"
    title: "Invita al calendario a la presentación"
    format: "diapositiva comentada"
    scene: "El piloto baja incidencias en noviembre-diciembre. La serie de tres años muestra un valle parecido cada invierno."
    learning_objective: "Detectar patrón estacional."
    visual_clue:
      type: "serie temporal"
      data: "Valles repetidos en diciembre de 2023, 2024 y 2025."
      reading_cue: "Busca formas que regresan antes de mirar el color del piloto."
    false_lead: "La caída empieza con el piloto y por eso le pertenece."
    primary_question: "¿Qué línea obliga a compartir crédito con diciembre?"
    response_mode: "lectura guiada"
    expected_answer: "Los valles de los dos años previos y la caída de la región comparable."
    explanation: "La coincidencia temporal no separa intervención de temporada. El inicio compartido es tentador porque produce una historia limpia; el histórico muestra que el calendario ya generaba una caída aun sin proyecto."
    common_error: "Usar antes/después cuando el antes pertenece a otra temporada."
    decision_required: "Recalcular contra mismo periodo y grupo comparable."
    transferable_rule: "Antes de atribuir una curva, pregúntale si ya tenía calendario."
    difficulty: "básico"
    minimum_sufficient_technique: "Serie temporal y comparación visual."
    connection_to_case: "Presenta a diciembre como variable, no como decoración."
  - id: "08_calc"
    title: "Separa el invierno del piloto"
    format: "nota de Planeación"
    scene: "La región tratada cae 25%; la comparable, 18%. Patrocinio quiere conservar el número completo porque ya tiene tipografía."
    learning_objective: "Calcular una diferencia adicional simple."
    visual_clue:
      type: "dos barras y calendario"
      data: "Caída tratada 25%; caída comparable 18%."
      reading_cue: "Resta la caída que ocurrió sin intervención."
    false_lead: "Impacto del piloto = 25%."
    primary_question: "¿Qué mejora adicional estima esta comparación?"
    response_mode: "cálculo"
    expected_answer: "Aproximadamente 7 puntos porcentuales adicionales."
    explanation: "25 menos 18 produce siete puntos bajo el supuesto de comparabilidad. No es una prueba definitiva, pero es una atribución más defendible. El 25% era tentador porque describe correctamente la caída total, no su causa."
    common_error: "Confundir cambio observado con efecto atribuible."
    decision_required: "Reportar total, referencia y diferencia adicional."
    transferable_rule: "El impacto empieza donde termina el escenario sin intervención."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Diferencia de cambios."
    connection_to_case: "Calcula cuánto crédito conserva el piloto después de pagar al calendario."
  - id: "08_dec"
    title: "Haz que el piloto sobreviva a agosto"
    format: "decisión de expansión"
    scene: "El informe anual ya está cerrado. Operaciones puede escalar hoy o repetir en otra temporada con una región comparable."
    learning_objective: "Elegir evidencia que generalice fuera del periodo favorable."
    visual_clue:
      type: "calendario de prueba"
      data: "Nueva ventana: mayo-agosto; región comparable; criterio previo de impacto."
      reading_cue: "Busca una prueba donde la temporada no haga el trabajo."
    false_lead: "Repetir diciembre aumenta el tamaño de muestra y resuelve estacionalidad."
    primary_question: "¿Qué diseño justificaría una meta anual?"
    response_mode: "decisión y transferencia"
    expected_answer: "Probar fuera del valle o con control comparable, criterio previo y seguimiento en temporada alta."
    explanation: "Más diciembres afinan el comportamiento invernal, pero no prueban desempeño anual. La repetición parece rigurosa por acumular datos; la generalización exige variar la condición que amenaza la conclusión."
    common_error: "Aumentar observaciones sin aumentar variación relevante."
    decision_required: "Condicionar expansión a impacto adicional fuera de temporada fácil."
    transferable_rule: "Una intervención anual debe ganar en más de una estación."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Grupo comparable y validación temporal."
    connection_to_case: "Evita que diciembre firme como consultor permanente."
