case_id: "01"
related_case: "examples/cases/01_dashboard_que_bajo_quejas_cerrando_boton.md"
case_title: "El botón que cumplió su meta"
narrative_motif: "el botón escondido"
corporate_satire_practice: "La métrica mejora cuando el rediseño dificulta producirla."
exercises:
  - id: "01_obs"
    title: "Detén la demo antes del confeti"
    format: "ticket de soporte"
    scene: "El tablero reporta 40% menos quejas. UX abre la nueva ruta y tarda tres pantallas en encontrar el botón."
    learning_objective: "Detectar un cambio en el mecanismo de captura."
    visual_clue:
      type: "serie temporal doble"
      data: "Quejas registradas: 100 a 60; intentos abandonados: 12 a 58."
      reading_cue: "Mira qué línea sube exactamente cuando baja la oficial."
    false_lead: "Menos registros significa que el servicio mejoró."
    primary_question: "Antes de que la cifra llegue al comité, ¿qué dato pedirías?"
    options: ["El color anterior del botón", "Intentos iniciados y abandonados por canal", "El promedio de caracteres de cada queja"]
    response_mode: "opción múltiple y justificación"
    expected_answer: "Intentos iniciados y abandonados por canal."
    explanation: "La caída coincide con abandonos crecientes; puede haber menos acceso, no menos malestar. El color seduce porque el cambio fue visual, pero no mide si alguien intentó quejarse."
    common_error: "Tomar ausencia de registro como ausencia del fenómeno."
    decision_required: "Pausar la celebración y reconstruir la serie comparable por canal."
    transferable_rule: "Si cambia la puerta de entrada, cambia primero la medición."
    difficulty: "básico"
    minimum_sufficient_technique: "Comparación antes/después de dos series."
    connection_to_case: "Repite la escena en que el botón reduce visibilidad, no necesariamente quejas."
  - id: "01_calc"
    title: "La cuenta que el botón no quería mostrar"
    format: "nota al margen de la demo"
    scene: "Producto conserva 60 quejas registradas y omite 58 intentos abandonados. El botón solicita que no sumen cosas negativas en viernes."
    learning_objective: "Construir una cota simple del volumen potencial."
    visual_clue:
      type: "mini tabla"
      data: "Antes: 100 registradas + 12 abandonos. Después: 60 registradas + 58 abandonos."
      reading_cue: "Suma registros e intentos como señal de demanda, sin afirmar que todo abandono era queja válida."
    false_lead: "La reducción real fue (100-60)/100 = 40%."
    primary_question: "¿Qué comparación mínima vuelve sospechoso ese 40%?"
    response_mode: "cálculo corto"
    expected_answer: "La señal total pasa de 112 a 118; no prueba más quejas, pero invalida celebrar una caída limpia."
    explanation: "Sumar es una aproximación, no una verdad causal. Sirve para mostrar que la demanda de acceso no cayó como los registros. La falsa pista era tentadora porque usa la métrica oficial correctamente, pero ignora cómo cambió su captura."
    common_error: "Declarar que los 58 abandonos eran quejas completas."
    decision_required: "Medir el embudo de acceso antes de afirmar mejora."
    transferable_rule: "Una cota imperfecta puede detener una conclusión mucho más imperfecta."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Suma, diferencia y comparación de proporciones."
    connection_to_case: "Cuantifica la contradicción entre registros e intentos."
  - id: "01_dec"
    title: "Devuelve la puerta sin romper la meta"
    format: "decisión de liberación"
    scene: "Negocio ofrece dos opciones: conservar el botón escondido hasta cerrar mes o restaurarlo y medir experiencia completa."
    learning_objective: "Elegir una corrección que preserve acceso y comparabilidad."
    visual_clue:
      type: "comparación de rutas"
      data: "Ruta antigua: 1 pantalla; ruta nueva: 3 pantallas y 49% de abandono."
      reading_cue: "Separa fricción útil de barrera de captura."
    false_lead: "Esperar un mes evita contaminar la medición."
    primary_question: "¿Qué decisión evita que el indicador aprenda a esconder clientes?"
    response_mode: "decisión justificada"
    expected_answer: "Restaurar acceso, instrumentar cada paso y reportar una ruptura metodológica."
    explanation: "Mantener la ruta protege el número, no al cliente. Restaurar y anotar el cambio permite aprender sin fingir continuidad. La opción cómoda parece prudente porque evita otra ruptura, pero prolonga un sesgo ya observado."
    common_error: "Priorizar una serie limpia sobre un canal funcional."
    decision_required: "Restaurar el botón y reiniciar la línea comparable."
    transferable_rule: "Nunca optimices la facilidad de medir sacrificando la posibilidad de hablar."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Embudo por paso y serie con marca metodológica."
    connection_to_case: "Cierra el ticket que confundió menos captura con menos quejas."
