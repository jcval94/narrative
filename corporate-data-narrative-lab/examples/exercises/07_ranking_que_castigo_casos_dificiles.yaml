case_id: "07"
related_case: "examples/cases/07_ranking_que_castigo_casos_dificiles.md"
case_title: "La mochila invisible del ranking"
narrative_motif: "la mochila"
corporate_satire_practice: "La empresa declara valorar calidad, pero paga velocidad sin carga."
exercises:
  - id: "07_obs"
    title: "Pesa la mochila antes del trofeo"
    format: "guía de premiación"
    scene: "Sara resuelve 5.2 casos diarios con complejidad 4.6 y calidad 94%. Luis resuelve 11.4 con complejidad 1.8 y calidad 86%."
    learning_objective: "Leer velocidad junto con carga y calidad."
    visual_clue:
      type: "scatter"
      data: "x=complejidad; y=resoluciones; tamaño/calidad."
      reading_cue: "Compara vecinos en complejidad, no solo altura."
    false_lead: "Luis es más del doble de productivo."
    primary_question: "¿Qué parte del mapa impide entregar el trofeo todavía?"
    response_mode: "interpretación"
    expected_answer: "La relación descendente entre complejidad y velocidad, más la diferencia de calidad."
    explanation: "El ranking bruto mezcla terreno y resultado. Luis puede rendir bien, pero la gráfica no permite atribuir toda la brecha a desempeño. La altura seduce porque es visible y paga, mientras la carga permanece fuera de la fórmula."
    common_error: "Comparar personas sometidas a poblaciones distintas."
    decision_required: "Comparar dentro de complejidad antes de premiar."
    transferable_rule: "Una mochila invisible sigue pesando aunque la métrica no la registre."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Scatter y comparación condicional."
    connection_to_case: "Vuelve visible la carga que la guía omitió."
  - id: "07_calc"
    title: "Dos asesores en la misma pendiente"
    format: "cálculo de grupo"
    scene: "Dentro de complejidad alta, Sara resuelve 5.2 y Mei 6.1 por día. Sus calidades son 94% y 96%."
    learning_objective: "Comparar desempeño dentro de un grupo homogéneo."
    visual_clue:
      type: "comparación de pares"
      data: "Sara 5.2/94%; Mei 6.1/96%; complejidad 4.6/4.2."
      reading_cue: "Calcula diferencia de velocidad y conserva calidad."
    false_lead: "El ranking global de once casos diarios sigue siendo referencia justa."
    primary_question: "¿Qué comparación produce una conversación útil con Sara?"
    response_mode: "cálculo corto"
    expected_answer: "Mei supera por 0.9 casos diarios con carga parecida y 2 puntos de calidad; esa es una brecha investigable."
    explanation: "El par comparable reduce la influencia de dificultad. No prueba causalidad ni culpabilidad, pero señala prácticas que podrían aprenderse. La referencia global era tentadora por simplicidad, aunque describía otro tipo de trabajo."
    common_error: "Convertir el ajuste en excusa para no buscar mejora dentro del grupo."
    decision_required: "Revisar proceso con pares comparables."
    transferable_rule: "Ajustar hace la conversación más exigente, no menos."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Diferencia simple dentro de estrato."
    connection_to_case: "Separa justicia de indulgencia."
  - id: "07_dec"
    title: "Diseña un bono que no enseñe a huir"
    format: "enmienda de nómina"
    scene: "Compensación acepta complejidad, pero propone que cada asesor etiquete sus propios casos. La mochila empieza a inflarse por razones fiscales."
    learning_objective: "Anticipar manipulación de una métrica ajustada."
    visual_clue:
      type: "árbol de decisión"
      data: "Complejidad observable; calidad; reapertura; auditoría de selección."
      reading_cue: "Incluye control para la conducta que crea el nuevo incentivo."
    false_lead: "Asignar un peso fijo resuelve todo."
    primary_question: "¿Qué piloto corrige el ranking sin fabricar casos difíciles?"
    response_mode: "decisión robusta"
    expected_answer: "Comparar por grupos con etiquetas auditadas, calidad, reapertura y monitoreo de selección."
    explanation: "El peso fijo reconoce carga, pero puede volver rentable inflarla. Una prueba temporal permite revisar distribución y conducta antes de pagar a escala. La solución debe corregir el incentivo viejo y observar el incentivo nuevo."
    common_error: "Optimizar la fórmula sin anticipar cómo será jugada."
    decision_required: "Probar seis semanas y auditar cambios de mezcla."
    transferable_rule: "Toda métrica de incentivo necesita una prueba de comportamiento."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Ajuste por grupos y monitoreo de gaming."
    connection_to_case: "Evita que la mochila obtenga relleno administrativo."
