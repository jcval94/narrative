case_id: "04"
related_case: "examples/cases/04_sucursal_estrella_casos_faciles.md"
case_title: "La pendiente más amable del corporativo"
narrative_motif: "la pendiente"
corporate_satire_practice: "El algoritmo premia rapidez enviando trabajo fácil y luego llama mérito al resultado."
exercises:
  - id: "04_obs"
    title: "Mira qué cargaba cada sucursal"
    format: "acta intervenida"
    scene: "La sucursal Norte presume 92% de resolución. En las barras apiladas, 78% de sus casos son simples. Sur carga 61% severos."
    learning_objective: "Separar desempeño de mezcla de casos."
    visual_clue:
      type: "barras apiladas"
      data: "Norte: 78% simples, 8% severos; Sur: 20% simples, 61% severos."
      reading_cue: "Compara la composición antes de comparar la altura del resultado."
    false_lead: "92% demuestra que Norte tiene mejor proceso."
    primary_question: "¿Estamos comparando desempeño o mezcla de casos?"
    response_mode: "hipótesis justificada"
    expected_answer: "Principalmente mezcla; hace falta comparar dentro de severidad."
    explanation: "La asignación entrega terrenos distintos. El 92% es real, por eso convence, pero no identifica cuánto pertenece al equipo. Comparar por severidad prueba si la ventaja persiste en casos semejantes."
    common_error: "Tratar población asignada como si fuera aleatoria."
    decision_required: "Suspender el ranking bruto y estratificar."
    transferable_rule: "Antes de comparar corredores, mira la pendiente."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Distribución de mezcla y tasas estratificadas."
    connection_to_case: "Hace visible la pendiente que el ranking borró."
  - id: "04_calc"
    title: "Dos carreras sobre el mismo terreno"
    format: "anexo de asignación"
    scene: "Data encuentra tasas en casos severos: Norte 61/100 y Sur 64/100. En simples: Norte 95/100 y Sur 94/100."
    learning_objective: "Comparar tasas dentro de grupos homogéneos."
    visual_clue:
      type: "tabla 2x2"
      data: "Severos N=61%, S=64%; simples N=95%, S=94%."
      reading_cue: "Calcula diferencias dentro de cada dificultad, no una tasa mezclada."
    false_lead: "La brecha bruta de 92% contra 73% debe conservarse."
    primary_question: "¿Qué cuenta cambia cuando las pendientes se igualan?"
    response_mode: "cálculo corto"
    expected_answer: "Sur supera por 3 puntos en severos; Norte por 1 en simples. La gran brecha bruta proviene del mix."
    explanation: "Dentro de grupos, el desempeño es parecido y Sur incluso lidera lo severo. La tasa total era tentadora porque resume toda la operación, pero mezcla cargas que el algoritmo repartió de forma desigual."
    common_error: "Promediar tasas sin conservar pesos y composición."
    decision_required: "Reportar desempeño estratificado y mezcla recibida."
    transferable_rule: "Una tasa agregada puede describir la cartera y atribuirla por error al equipo."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Diferencia de proporciones por estrato."
    connection_to_case: "Demuestra que la estrella recibió una carrera distinta."
  - id: "04_dec"
    title: "Rediseña el aplauso y la asignación"
    format: "decisión de comité"
    scene: "Dirección quiere premiar Norte y enviarle todavía más casos simples porque 'los mueve rápido'. La pendiente solicita derecho de réplica."
    learning_objective: "Corregir comparación y bucle de asignación."
    visual_clue:
      type: "bucle causal"
      data: "Rapidez → casos simples → mayor rapidez → premio."
      reading_cue: "Identifica dónde la métrica modifica la población futura."
    false_lead: "Ajustar solo el ranking elimina el sesgo."
    primary_question: "¿Qué decisión rompe el ciclo sin castigar experiencia?"
    response_mode: "decisión robusta"
    expected_answer: "Auditar asignación, equilibrar dentro de capacidad y comparar por severidad con calidad."
    explanation: "Corregir el marcador sin tocar el reparto deja vivo el mecanismo que produce la ventaja. Equilibrar todo ciegamente también sería riesgoso; la solución considera especialidad, severidad y resultado."
    common_error: "Tratar el sesgo de medición separado del sistema de asignación."
    decision_required: "Pilotear reglas de reparto y evaluación conjuntamente."
    transferable_rule: "Cuando una métrica alimenta la asignación, audita el ciclo completo."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Estratificación y auditoría de política de asignación."
    connection_to_case: "Evita que correr cuesta abajo genere más bajadas fáciles."
