case_id: "02"
related_case: "examples/cases/02_encuesta_que_solo_contestaron_los_felices.md"
case_title: "El silencio obtuvo 72 puntos"
narrative_motif: "el silencio"
corporate_satire_practice: "El comité mejora satisfacción dejando fuera a quien abandonó."
exercises:
  - id: "02_obs"
    title: "Busca a quien no recibió el correo"
    format: "correo reenviado"
    scene: "La encuesta celebra 72 puntos. Abajo, el pie dice: envío posterior a proceso completado. El silencio está copiado, pero no responde."
    learning_objective: "Detectar población excluida de una encuesta."
    visual_clue:
      type: "embudo"
      data: "10,000 iniciaron; 6,200 completaron; 6,200 recibieron encuesta; 1,550 respondieron."
      reading_cue: "Localiza la pérdida que ocurre antes de enviar."
    false_lead: "Una muestra de 1,550 es grande y por eso representativa."
    primary_question: "¿A quién dejó de escuchar la encuesta?"
    options: ["A quienes abandonaron el proceso", "A quienes respondieron rápido", "A quienes dieron calificación alta"]
    response_mode: "opción múltiple"
    expected_answer: "A quienes abandonaron el proceso."
    explanation: "El tamaño no corrige una puerta de entrada selectiva. Quienes completaron tuvieron una experiencia distinta. La falsa pista convence porque 1,550 parece suficiente, pero representatividad depende de quién pudo ser invitado."
    common_error: "Confundir muestra grande con muestra representativa."
    decision_required: "No presentar el puntaje como voz de toda la jornada."
    transferable_rule: "Pregunta quién pudo contestar antes de contar respuestas."
    difficulty: "básico"
    minimum_sufficient_technique: "Embudo y tasa de cobertura."
    connection_to_case: "Reproduce el momento en que el silencio aparece entre inicio y envío."
  - id: "02_calc"
    title: "El denominador que faltó al correo"
    format: "anexo de comité"
    scene: "La minuta dice '25% de respuesta'. Data agrega una línea: 1,550 respuestas sobre 10,000 personas que iniciaron."
    learning_objective: "Distinguir tasa de respuesta entre invitados y cobertura total."
    visual_clue:
      type: "mini cálculo"
      data: "1,550/6,200 invitados = 25%; 1,550/10,000 iniciados = 15.5%."
      reading_cue: "Calcula ambas tasas y nombra qué población representa cada una."
    false_lead: "El 25% describe a todos los clientes del proceso."
    primary_question: "¿Qué porcentaje revela mejor el alcance de la escucha?"
    response_mode: "cálculo y explicación"
    expected_answer: "15.5% mide respuestas sobre quienes iniciaron; debe mostrarse junto con 25% entre invitados."
    explanation: "Ninguna tasa estima sola la satisfacción de abandonos, pero juntas revelan cobertura. El 25% era correcto para invitados y por eso tentador; se volvió engañoso al extenderse a toda la población."
    common_error: "Usar un denominador válido para responder una pregunta distinta."
    decision_required: "Publicar cobertura por etapa y buscar señal de abandonos."
    transferable_rule: "Todo porcentaje necesita decir quién tuvo oportunidad de entrar."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Dos proporciones con denominadores explícitos."
    connection_to_case: "Hace visible el silencio que el NPS resumió."
  - id: "02_dec"
    title: "Invita al silencio sin obligarlo a sonreír"
    format: "diseño de siguiente medición"
    scene: "Experiencia propone encuestar también al abandonar. Comité pide que eso no baje el número antes del trimestre."
    learning_objective: "Diseñar cobertura sin forzar comparabilidad falsa."
    visual_clue:
      type: "dos rutas de encuesta"
      data: "Completaron: invitación final; abandonaron: invitación breve en canal alterno."
      reading_cue: "Conserva resultados por etapa antes de combinar."
    false_lead: "Mezclar todas las respuestas mantiene una sola cifra ejecutiva."
    primary_question: "¿Qué diseño escucha mejor sin fabricar otro promedio cómodo?"
    response_mode: "decisión y transferencia"
    expected_answer: "Invitar en ambas etapas, reportar cobertura y satisfacción separadas, y combinar solo con ponderación defendible."
    explanation: "Las experiencias y probabilidades de respuesta difieren. Separarlas hace visible el sesgo; mezclarlas de inmediato puede esconderlo otra vez. Una cifra única parece comunicable, pero sacrifica la pregunta que motivó el rediseño."
    common_error: "Corregir exclusión creando una mezcla opaca."
    decision_required: "Pilotear invitación por etapa y vigilar no respuesta."
    transferable_rule: "Escuchar a más personas no autoriza a mezclar voces sin contexto."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Estratificación por etapa y cobertura."
    connection_to_case: "Convierte a los abandonos en población observable sin prometer representatividad automática."
