case_id: "06"
related_case: "examples/cases/06_automatizacion_que_ahorro_powerpoint.md"
case_title: "Las dos mil horas que cambiaron de reunión"
narrative_motif: "la hora ahorrada"
corporate_satire_practice: "La eficiencia se convierte en más producción y aun así se registra como costo eliminado."
exercises:
  - id: "06_obs"
    title: "Encuentra la hora en el calendario"
    format: "memo de beneficios"
    scene: "El memo promete 2,000 horas. Después aparecen 1,050 en reportes y 710 en revisiones. La hora ahorrada tiene tres invitaciones pendientes."
    learning_objective: "Distinguir tarea eliminada de capacidad capturada."
    visual_clue:
      type: "barras antes/después"
      data: "Manual baja 2,000; nuevas demandas absorben 1,760; quedan 240."
      reading_cue: "Sigue el área que desaparece y dónde reaparece."
    false_lead: "Toda hora automatizada equivale a ahorro financiero."
    primary_question: "¿Qué parte del beneficio está realmente disponible o capturada?"
    response_mode: "lectura de gráfica"
    expected_answer: "240 horas; las otras 1,760 fueron reasignadas."
    explanation: "La automatización sí libera tarea, pero el destino define el beneficio. Declarar cero sería tan incorrecto como declarar 2,000. La cifra grande seduce porque viene de una multiplicación válida aplicada a una conclusión distinta."
    common_error: "Monetizar capacidad potencial como costo evitado."
    decision_required: "Separar liberado, reasignado y capturado."
    transferable_rule: "Una tarea eliminada todavía necesita destino."
    difficulty: "básico"
    minimum_sufficient_technique: "Balance antes/después."
    connection_to_case: "Localiza la hora que cambió de asunto, no de calendario."
  - id: "06_calc"
    title: "Calcula antes de renovar enterprise"
    format: "anexo financiero"
    scene: "Compras ya multiplicó 2,000 horas por $300. Leo encuentra que solo 240 redujeron capacidad contratada o quedaron libres."
    learning_objective: "Calcular beneficio teórico y capturado sin mezclarlos."
    visual_clue:
      type: "mini cuenta"
      data: "2,000 × $300; 240 × $300."
      reading_cue: "Etiqueta ambos resultados antes de presentarlos."
    false_lead: "$600,000 es ahorro porque la multiplicación es correcta."
    primary_question: "¿Qué cifras deben convivir en el caso de beneficio?"
    response_mode: "cálculo y etiquetado"
    expected_answer: "$600,000 de capacidad teórica y $72,000 capturados bajo el supuesto dado."
    explanation: "La aritmética de $600,000 es correcta, pero su etiqueta no. Separar potencial de captura permite valorar también resultados de la reasignación. La falsa pista resulta potente porque un cálculo exacto puede sostener una categoría equivocada."
    common_error: "Confundir precisión matemática con validez económica."
    decision_required: "Renovar con beneficios etiquetados y evidencia de resultado."
    transferable_rule: "Audita el sustantivo de una cifra, no solo su multiplicación."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Multiplicación y conciliación de categorías."
    connection_to_case: "Evita que PowerPoint capture todo el ahorro."
  - id: "06_dec"
    title: "No automatices el seguimiento del seguimiento"
    format: "diseño de piloto"
    scene: "Transformación propone registrar cada minuto liberado en una plataforma nueva. El formulario requiere una hora semanal."
    learning_objective: "Diseñar trazabilidad proporcional."
    visual_clue:
      type: "matriz simple"
      data: "Destino agregado: capacidad, costo, valor nuevo; resultado trimestral."
      reading_cue: "Busca evidencia suficiente sin consumo excesivo."
    false_lead: "Más detalle siempre produce una medición más honesta."
    primary_question: "¿Qué seguimiento evita comerse el beneficio?"
    response_mode: "decisión de diseño"
    expected_answer: "Conciliación agregada por equipo y trimestre con resultados y carga percibida."
    explanation: "La granularidad individual puede costar más que la precisión que aporta. No medir nada preserva opacidad; medir cada minuto crea otra tarea. El diseño robusto sigue categorías y resultados con una frecuencia útil para decidir."
    common_error: "Responder a una proxy pobre con burocracia exhaustiva."
    decision_required: "Pilotear seguimiento ligero durante un trimestre."
    transferable_rule: "La medición de eficiencia también debe ser eficiente."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Balance agregado y resultado observable."
    connection_to_case: "Impide que la hora ahorrada termine documentándose a sí misma."
