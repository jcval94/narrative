case_id: "03"
related_case: "examples/cases/03_modelo_que_aprendio_horario_supervisor.md"
case_title: "La IA que llegaba después del incidente"
narrative_motif: "el reloj"
corporate_satire_practice: "La urgencia por presentar IA deja que el modelo consulte una revisión futura."
exercises:
  - id: "03_obs"
    title: "Detén el reloj de validación"
    format: "postmortem"
    scene: "El modelo presume 96% de precisión. En la línea de tiempo, la variable 'revisión_supervisor' aparece dos horas después de la decisión."
    learning_objective: "Identificar información no disponible al decidir."
    visual_clue:
      type: "línea de tiempo"
      data: "08:00 evento; 08:05 predicción requerida; 10:10 revisión; 10:15 variable cargada."
      reading_cue: "Traza una línea vertical en 08:05."
    false_lead: "La variable es válida porque existe en la base histórica."
    primary_question: "¿Qué dato no podía cruzar la línea de las 08:05?"
    options: ["Señales del evento a las 08:00", "Revisión del supervisor a las 10:10", "Historial previo del equipo"]
    response_mode: "opción múltiple"
    expected_answer: "La revisión del supervisor a las 10:10."
    explanation: "La variable existe al entrenar, pero no al usar el modelo. El histórico completo parece legítimo porque está documentado; sin embargo, contiene una respuesta posterior disfrazada de predictor."
    common_error: "Confundir presencia en la tabla con disponibilidad operativa."
    decision_required: "Excluir cualquier variable nacida después del corte de decisión."
    transferable_rule: "Pon reloj a cada variable antes de ponerle importancia."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Auditoría temporal de variables."
    connection_to_case: "Interroga el reloj que reveló la fuga."
  - id: "03_calc"
    title: "La precisión pierde su permiso de estacionamiento"
    format: "comparación de validaciones"
    scene: "Sin la revisión futura, precisión baja de 96% a 71%. Dirección pregunta si Data rompió la IA."
    learning_objective: "Interpretar una caída de desempeño al corregir leakage."
    visual_clue:
      type: "dos barras"
      data: "Con variable posterior: 96%; solo variables disponibles: 71%."
      reading_cue: "Calcula la brecha, pero interpreta qué versión puede existir en producción."
    false_lead: "Debe conservarse la versión de 96% porque predice mejor."
    primary_question: "¿Qué modelo es realmente evaluable para la decisión de las 08:05?"
    response_mode: "diferencia y razonamiento"
    expected_answer: "El de 71%; pierde 25 puntos, pero usa información disponible."
    explanation: "La cifra menor es una estimación honesta del problema real. El 96% seduce porque maximiza desempeño, pero responde después de conocer parte del resultado. No se arregla producción celebrando una validación imposible."
    common_error: "Preferir precisión retrospectiva sobre utilidad prospectiva."
    decision_required: "Replantear umbral y piloto con el modelo temporalmente válido."
    transferable_rule: "Una métrica peor puede ser evidencia de una evaluación mejor."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Comparación absoluta de desempeño y corte temporal."
    connection_to_case: "Mide cuánto del brillo provenía del futuro."
  - id: "03_dec"
    title: "Publica una IA que no viaje en el tiempo"
    format: "gate de despliegue"
    scene: "El comité ofrece renombrar la variable como 'señal experta' para conservar el lanzamiento. El reloj no acepta branding."
    learning_objective: "Definir una validación alineada con producción."
    visual_clue:
      type: "secuencia operativa"
      data: "Entrenar por periodos pasados; validar en periodo futuro; calcular variables al corte."
      reading_cue: "Ordena los pasos sin permitir datos posteriores."
    false_lead: "Cambiar el nombre elimina la fuga."
    primary_question: "¿Qué condición debe aprobar el despliegue?"
    response_mode: "ordenar pasos y justificar"
    expected_answer: "Congelar datos al momento de decisión, separar periodos y validar el flujo completo."
    explanation: "La fuga es temporal, no semántica. El renombre parece una salida porque la variable resume experiencia humana, pero sigue naciendo tarde. El modelo debe reproducir exactamente la información disponible cuando actuará."
    common_error: "Auditar columnas sin auditar cuándo se calculan."
    decision_required: "Bloquear despliegue hasta reproducir el corte temporal."
    transferable_rule: "Si producción no puede saberlo entonces, entrenamiento tampoco."
    difficulty: "avanzado"
    minimum_sufficient_technique: "Validación temporal y prueba de disponibilidad."
    connection_to_case: "Evita que el reloj vuelva a aparecer después del incidente."
