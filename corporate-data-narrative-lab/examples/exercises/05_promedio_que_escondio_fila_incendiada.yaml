case_id: "05"
related_case: "examples/cases/05_promedio_que_escondio_fila_incendiada.md"
case_title: "La cola que no cabía en el promedio"
narrative_motif: "el recibo 0098"
corporate_satire_practice: "Una plantilla de una cifra convierte mejora promedio en permiso para reducir guardia."
exercises:
  - id: "05_obs"
    title: "Sigue el recibo hasta el extremo"
    format: "guardia nocturna"
    scene: "El promedio baja de 18 a 14 minutos. El recibo 0098 ya incluye cambio de fecha."
    learning_objective: "Reconocer una cola crítica detrás de una media favorable."
    visual_clue:
      type: "distribución"
      data: "Media 14; mediana 7; p90 38; p95 121."
      reading_cue: "Compara centro y extremo antes de aceptar el verde."
    false_lead: "La media menor implica que todos esperan menos."
    primary_question: "¿Qué cifra defendería a quienes más esperan?"
    options: ["Solo media", "Solo el caso 0098", "Mediana, p90, p95 y volumen de cola"]
    response_mode: "opción múltiple"
    expected_answer: "Mediana, p90, p95 y volumen de cola."
    explanation: "La combinación describe experiencia típica y extrema. Un solo recibo emociona, pero no dimensiona; una sola media dimensiona, pero oculta. Los percentiles muestran cuánta espera soporta una fracción concreta."
    common_error: "Suponer que el centro representa toda la distribución."
    decision_required: "No reducir cobertura usando solo la media."
    transferable_rule: "Cuando el daño vive en la cola, muestra la cola."
    difficulty: "básico"
    minimum_sufficient_technique: "Lectura de media, mediana y percentiles."
    connection_to_case: "Usa el recibo como entrada a la distribución, no como sustituto."
  - id: "05_calc"
    title: "Diecinueve de veinte ya no bastan"
    format: "nota de capacidad"
    scene: "Hay 2,000 atenciones al mes y p95 es 121 minutos. Planeación pregunta cuántos casos viven más allá de esa marca."
    learning_objective: "Traducir percentil a volumen operativo."
    visual_clue:
      type: "mini cálculo"
      data: "5% de 2,000 atenciones."
      reading_cue: "Convierte el extremo porcentual en personas."
    false_lead: "Cinco por ciento es demasiado pequeño para cambiar capacidad."
    primary_question: "¿Cuántos recibos pueden superar aproximadamente 121 minutos?"
    response_mode: "cálculo"
    expected_answer: "Aproximadamente 100 casos al mes."
    explanation: "0.05 por 2,000 produce 100. El porcentaje parecía pequeño porque estaba aislado del volumen; traducirlo muestra una guardia recurrente, no una anécdota. El cálculo no identifica severidad, por lo que debe acompañarse de contexto operativo."
    common_error: "Confundir proporción pequeña con impacto pequeño."
    decision_required: "Dimensionar cobertura para la cola observada."
    transferable_rule: "Convierte porcentajes extremos en casos antes de llamarlos excepciones."
    difficulty: "básico"
    minimum_sufficient_technique: "Porcentaje de un total."
    connection_to_case: "Da volumen al recibo que no cabía en la lámina."
  - id: "05_dec"
    title: "Reescribe la plantilla de una cifra"
    format: "decisión de guardia"
    scene: "El comité permite una métrica principal y dos guardas. Celia debe elegir antes de que la impresora vuelva a pedir relevo."
    learning_objective: "Diseñar metas que protejan centro y extremos."
    visual_clue:
      type: "tabla de alternativas"
      data: "Media; mediana; p95; casos críticos por antigüedad."
      reading_cue: "Asigna una métrica al centro y guardas al riesgo."
    false_lead: "Usar solo p95 corrige por completo el problema."
    primary_question: "¿Qué combinación evita optimizar un extremo a costa del resto?"
    response_mode: "decisión justificada"
    expected_answer: "Mediana o media para centro, p95 y antigüedad crítica como guardas."
    explanation: "Solo p95 puede mover recursos sin cuidar a la mayoría; solo media repite el daño. La combinación establece experiencia general y límites de abandono. La tentación de una cifra persiste porque simplifica gobierno, no porque describa mejor."
    common_error: "Cambiar una métrica única por otra métrica única."
    decision_required: "Pilotear guardas de cola durante cuatro semanas."
    transferable_rule: "Pon metas al centro y límites al daño extremo."
    difficulty: "intermedio"
    minimum_sufficient_technique: "Panel narrativo mínimo de centro y cola."
    connection_to_case: "Hace que la cola quepa sin convertir el caso en dashboard."
